{% extends "base.html" %}
{% block title %}Manuel İşlem{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Manuel İşlem</h1>
</div>

<div class="card" style="max-width:480px">
  <form method="post" action="/manual/order">
    <div class="form-group">
      <label>Hisse Senedi</label>
      <select name="symbol" class="form-control" required>
        {% for sym in symbols %}
        <option value="{{ sym }}">{{ sym | replace(".IS","") }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>İşlem Yönü</label>
      <div class="btn-group">
        <input type="radio" name="side" id="buy" value="BUY" checked>
        <label for="buy" class="btn btn-success">AL</label>
        <input type="radio" name="side" id="sell" value="SELL">
        <label for="sell" class="btn btn-danger">SAT</label>
      </div>
    </div>
    <div class="form-group">
      <label>Miktar (Lot)</label>
      <input type="number" name="quantity" min="1" value="1" class="form-control" required>
    </div>
    <div class="form-note">
      Fiyat otomatik olarak güncel piyasa fiyatından alınır.
    </div>
    <button type="submit" class="btn btn-success" style="width:100%">Emri Gönder</button>
  </form>
</div>
{% endblock %}
